steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aozora/importer:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aozora/importer:latest'
      - '.'

  # 2. Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/aozora/importer']

  # 3. Update the Cloud Run Job to use the new image and latest secrets
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'aozora-importer'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aozora/importer:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--cpu'
      - '2'
      - '--memory'
      - '4Gi'
      - '--task-timeout'
      - '900s'
      - '--max-retries'
      - '1'
      - '--set-env-vars'
      - 'R2_BUCKET_NAME=${_R2_BUCKET_NAME},CLOUDFLARE_ACCOUNT_ID=${_CLOUDFLARE_ACCOUNT_ID}'
      - '--update-secrets'
      - 'R2_ACCOUNT_ID=R2_ACCOUNT_ID:latest,R2_ACCESS_KEY_ID=R2_ACCESS_KEY_ID:latest,R2_SECRET_ACCESS_KEY=R2_SECRET_ACCESS_KEY:latest,ALGOLIA_APP_ID=ALGOLIA_APP_ID:latest,ALGOLIA_ADMIN_KEY=ALGOLIA_ADMIN_KEY:latest,PUBLIC_ALGOLIA_APP_ID=ALGOLIA_APP_ID:latest,PUBLIC_ALGOLIA_SEARCH_KEY=ALGOLIA_SEARCH_KEY:latest,CLOUDFLARE_API_TOKEN=CLOUDFLARE_API_TOKEN:latest'

substitutions:
  _REGION: asia-northeast1
  _R2_BUCKET_NAME: aozora
  _CLOUDFLARE_ACCOUNT_ID: ''  # set in Cloud Build trigger substitutions

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aozora/importer:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aozora/importer:latest'
